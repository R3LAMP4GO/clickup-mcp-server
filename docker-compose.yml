services:
  clickup-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp/clickup-server:latest
    container_name: clickup-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"   # MCP SSE endpoint (Tailnet-only via ACL)
      - "3456:3456"   # Webhook listener (Tailscale Funnel for public)
    volumes:
      - ./data:/app/data   # Persist SQLite (tokens, future workflows)
    environment:
      - NODE_ENV=production
      - TZ=America/Chicago
      - DATA_DIR=/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
